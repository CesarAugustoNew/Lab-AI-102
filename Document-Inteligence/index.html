<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Auditoria de Recibos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Sistema de Auditoria de Recibos</h1>

        <form action="/upload" method="post" enctype="multipart/form-data">
            <label for="arquivo">Selecione o recibo:</label>
            <input type="file" id="arquivo" name="arquivo" required>

            <button type="submit">Analisar Recibo</button>
        </form>

        <div class="resultado">
            <h2>Resultado da Auditoria</h2>
            <p>Aguardando análise...</p>
        </div>
    </div>

</body>
</html>
